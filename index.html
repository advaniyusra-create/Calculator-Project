<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background-color: rgb(59, 70, 100);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        #answer-box {
            width: 500px;
            height: 120px;
            background-color: rgb(24, 31, 50);
            border-radius: 10px;
            color: white;
            padding: 20px;
            font-size: 30px;
            display: flex;
            align-items: center;
            font-weight: 800;
        }

        .calculate-box {
            width: 500px;
            height: 400px;
            background-color: rgb(37, 45, 68);
            border-radius: 10px;
            flex-wrap: wrap;
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        .calculate-box button {
            width: 100px;
            height: 50px;
            background-color: rgb(234, 227, 219);
            border-radius: 10px;
            font-weight: 700;
            font-size: 20px;
            -webkit-box-shadow: 3px 3px 1px 0px #999999;
            box-shadow: 3px 3px 1px 0px #999999;
            border: none;
            outline: none;
        }

        .calculate-box button:hover {
            background-color: rgb(255, 248, 240);
        }

        .calculate-box button:nth-child(17) {
            width: 220px;
            height: 50px;
            background-color: rgb(100, 114, 153);
            -webkit-box-shadow: 3px 3px 1px 0px #414e71;
            box-shadow: 3px 3px 1px 0px #414e71;
            color: white;
        }

        .calculate-box button:nth-child(17):hover {
            background-color: rgb(118, 134, 179);
        }

        .calculate-box button:nth-child(18) {
            width: 220px;
            height: 50px;
            background-color: rgb(209, 63, 48);
            -webkit-box-shadow: 3px 3px 1px 0px #8f2316;
            box-shadow: 3px 3px 1px 0px #761b11;
            color: white;
        }

        .calculate-box button:nth-child(18):hover {
            background-color: rgb(228, 82, 66);
        }

        .calculate-box button:nth-child(4) {
            width: 100px;
            height: 50px;
            background-color: rgb(100, 114, 153);
            -webkit-box-shadow: 3px 3px 1px 0px #414e71;
            box-shadow: 3px 3px 1px 0px #414e71;
            color: white;
        }

        .calculate-box button:nth-child(4):hover {
            background-color: rgb(118, 134, 179);
        }
    </style>
</head>

<body>
    <div id="answer-box"></div>
    <div class="calculate-box">
        <button onclick="button('7')">7</button>
        <button onclick="button('8')">8</button>
        <button onclick="button('9')">9</button>

        <button onclick="del()">DEL</button>

        <button onclick="button('4')">4</button>
        <button onclick="button('5')">5</button>
        <button onclick="button('6')">6</button>
        <button onclick="button('+')">+</button>
        <button onclick="button('1')">1</button>
        <button onclick="button('2')">2</button>
        <button onclick="button('3')">3</button>
        <button onclick="button('-')">-</button>
        <button onclick="button('.')">.</button>
        <button onclick="button('0')">0</button>
        <button onclick="button('÷')">÷</button>
        <button onclick="button('×')">X</button>

        <button onclick="reset('')">RESET</button>

        <button onclick="calculate()">=</button>
    </div>




    <script>

        const answer = document.getElementById("answer-box")

        function button(value){
            answer.innerText = answer.innerText + value;
        }
        function reset(value){
            answer.innerText = value
        }
        function del(value){
            answer.innerText = answer.innerText.slice(0,-1)
        }
        function calculate(value){
            let calculate = answer.innerText
            calculate = calculate.replaceAll("×", "*")
            calculate = calculate.replaceAll("÷", "/")
            answer.innerText = eval(calculate)
        }

    </script>
</body>

</html>
